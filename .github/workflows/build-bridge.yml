name: Build LCU bridge (Windows exe)

on:
  push:
    branches: [master]
    paths:
      - "bridge/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: bridge
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        working-directory: bridge
        run: pyinstaller --onefile --console --name lcu_bridge lcu_bridge.py

      - uses: actions/upload-artifact@v4
        with:
          name: lcu_bridge-windows
          path: bridge/dist/lcu_bridge.exe
