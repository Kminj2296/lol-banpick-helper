name: Build LCU bridge (Windows exe)

on:
  push:
    branches: [master]
    paths:
      - "bridge/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: bridge
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        working-directory: bridge
        run: pyinstaller --onefile --console --name lcu_bridge lcu_bridge.py

      - uses: actions/upload-artifact@v4
        with:
          name: lcu_bridge-windows
          path: bridge/dist/lcu_bridge.exe

      - name: Publish to bridge-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload bridge-latest bridge/dist/lcu_bridge.exe --clobber --repo "$GITHUB_REPOSITORY" \
            || gh release create bridge-latest bridge/dist/lcu_bridge.exe \
                 --title "PC방 실시간 연동 브리지 (Windows)" \
                 --notes "롤 클라이언트에서 밴/픽을 읽어 웹 밴픽 도우미로 실시간 전송하는 프로그램입니다. 다운로드 후 더블클릭 실행하세요 (설치 불필요)." \
                 --repo "$GITHUB_REPOSITORY"
